<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ordinary</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bitcount+Ink:wght@100..900&family=Jersey+10&display=swap');

    body {
      margin: 0;
      min-height: 1800px;
      animation: changeColor 10s infinite;
      font-family: 'Jersey 10', sans-serif;
    }

    @keyframes changeColor {
      0% { background-color: rgb(78, 68, 68); }
      33% { background-color: rgb(50, 48, 48); }
      66% { background-color: rgb(29, 39, 44); }
      77% { background-color: rgb(147, 149, 148); }
      100% { background-color: rgb(4, 45, 28); }
    }

    .head {
      position: fixed;
      top: 0;
      left: 0;
      background-color: white;
      padding: 10px;
      z-index: 1000;
      border-radius: 10px;
      width: fit-content;
    }

    .welcome {
      text-align: center;
      background-image: linear-gradient(to left, rgb(255, 0, 0), rgb(0, 0, 0));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 60px;
    }

    .wild {
      text-align: center;
      background-image: linear-gradient(to left, rgb(255, 255, 255), rgb(0, 128, 128));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .Contest {
      width: 120px;
      position: absolute;
      left: 700px;
      top: 150px;
    }

    .Hm {
      width: 500px;
      position: absolute;
      top: 900px;
      left: 500px;
    }

    .character-box {
      position: absolute;
      width: 100px;
      height: 100px;
      margin-top: 24px;
      cursor: pointer;
    }

    .Box {
      top: 300px;
      left: 780px;
      background-color: rgb(48, 10, 10);
      border: 2px solid hsl(87, 73%, 19%);
      box-shadow: 0 0 10px pink;
    }

    .ord {
      top: 300px;
      left: 640px;
      background-color: rgb(58, 56, 56);
      border: 2px solid hsl(87, 73%, 19%);
      box-shadow: 0 0 10px rgba(154, 140, 140, 0.5);
    }

    .yellow2 {
      top: 1227px;
      left: 300px;
      background-color: rgb(255, 251, 0);
      border: 2px solid white;
      box-shadow: 0 0 10px rgba(255, 238, 0, 0.5);
    }

    .sonic {
      top: 1100px;
      left: 730px;
      background: linear-gradient(to right, blue, teal);
      border: 2px solid white;
      box-shadow: 0 0 10px rgba(34, 0, 255, 0.5);
    }

    .tails {
      top: 1500px;
      left: 345px;
      background-color: rgb(111, 130, 196);
      border: 2px solid white;
      box-shadow: 0 0 10px rgba(0, 12, 119, 0.5);
    }

    .knuckles {
      top: 1250px;
      left: 1000px;
      background: linear-gradient(to right, red, maroon);
      border: 2px solid red;
      box-shadow: 0 0 10px black;
    }

    .Amy {
      top: 1500px;
      left: 900px;
      background-image: linear-gradient(to right, red, rgb(70, 11, 11));
      border: 2px solid hsl(0, 100%, 67%);
      box-shadow: 0 0 20px rgba(153, 105, 105, 0.5);
    }

    .kirbey,
    .bluey,
    .reddy {
      width: 100px;
      height: 100px;
      position: absolute;
      z-index: 10;
    }

    .grey,
    .yellow,
    .Funny,
    .anxity {
      width: 120px;
      position: absolute;
      z-index: 10;
    }

    .grey {
      filter: grayscale(100%);
      width: 140px;
    }

    .yellow {
      width: 140px;
    }

    .bluey {
      top: 4px;
      left: 5px;
    }

    .Funny {
      left: 5px;
    }

    .anxity {
      left: 1px;
    }

    .reddy {
      left: 5px;
    }

    .intro {
      position: absolute;
      left: 785px;
      top: 250px;
      background-image: linear-gradient(to left, rgb(255, 186, 186), rgb(227, 219, 219));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .text-box {
      display: none;
      position: absolute;
      top: 110px;
      left: 0;
      width: 220px;
      text-align: center;
      font-size: 18px;
      z-index: 20;
    }

    input:checked + .text-box {
      display: block;
    }

    .text-to-show {
      background-image: linear-gradient(to left, rgb(255, 186, 186), rgb(227, 219, 219));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .Crazy-text {
      background-image: linear-gradient(to left, rgb(0, 42, 255), rgb(96, 96, 96));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .MRA {
      background-image: linear-gradient(to left, rgb(234, 255, 0), white);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .blue-text {
      background-image: linear-gradient(to left, rgb(0, 38, 255), rgb(0, 221, 255));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .funny-text {
      background-image: linear-gradient(to left, rgb(240, 213, 5), rgb(41, 166, 255));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .anxity-text {
      background-image: linear-gradient(to left, rgb(255, 2, 2), rgb(157, 12, 12));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .amy-text {
      background-image: linear-gradient(to right, red, rgb(186, 215, 245));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
  </style>
</head>

<body>
  <div class="head">Credits</div>

  <h1 class="welcome">Welcome to MY WORLD</h1>
  <h1 class="wild">The Ordinary</h1>

  <img src="images/Host.gif" class="Contest" alt="Host" />
  <img src="images/Contest.gif" class="Hm" alt="Contest" />

  <h1 class="intro">kirbey</h1>

  <label for="toggle1">
    <div class="character-box Box">
      <img src="images/Kirbey.png" id="kirbey" class="kirbey" alt="Kirbey" />
      <audio src="audio/Like.mp3" id="kirb"></audio>
      <input type="checkbox" id="toggle1" hidden />
      <span class="text-box text-to-show">
        A nice and honest host who does everything in his power to fix the world itself.
      </span>
    </div>
  </label>

  <label for="toggle2">
    <div class="character-box ord">
      <img src="images/Ordin.png" class="grey" id="ordin" alt="Ordin" />
      <audio src="audio/audio2.mp3" id="audio2"></audio>
      <input type="checkbox" id="toggle2" hidden />
      <span class="text-box Crazy-text">
        A wild yet nice host who does his best to host his game.
      </span>
    </div>
  </label>

  <label for="toggle3">
    <div class="character-box yellow2">
      <img src="images/yellow.png" class="yellow" id="yellow" alt="Yellow" />
      <input type="checkbox" id="toggle3" hidden />
      <span class="text-box MRA">I'm yellow aka a nice person!</span>
    </div>
  </label>

  <label for="toggle4">
    <div class="character-box sonic">
      <img src="images/newblue.png" class="bluey" id="blue" alt="Blue" />
      <input type="checkbox" id="toggle4" hidden />
      <span class="text-box blue-text">I have a theory to rebel...</span>
    </div>
  </label>

  <label for="toggle5">
    <div class="character-box tails">
      <img src="images/Funny.png" class="Funny" alt="Funny" />
      <input type="checkbox" id="toggle5" hidden />
      <span class="text-box funny-text">
        HELLO! I'm so happy wow, a big world of something so big and goofy.
      </span>
    </div>
  </label>

  <label for="toggle6">
    <div class="character-box knuckles">
      <img src="images/anxity.png" class="anxity" alt="Anxity" />
      <input type="checkbox" id="toggle6" hidden />
      <span class="text-box anxity-text">
        Couldn't load text. We are trapped in this world.
      </span>
    </div>
  </label>

  <label for="toggle7">
    <div class="character-box Amy">
      <img src="images/reddy.png" class="reddy" alt="Reddy" />
      <input type="checkbox" id="toggle7" hidden />
      <span class="text-box amy-text">
        Despite him having a twisted mind, he's actually the most normal one around here.
      </span>
    </div>
  </label>

  <script src="script.js"></script>
</body>
</html>
